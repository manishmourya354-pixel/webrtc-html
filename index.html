<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morya Pro Video Connect</title>
    <style>
        :root {
            --glow-color: rgba(0, 255, 127, 0.4);
            --bg-dark: #0a0a0a;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-dark); color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        /* Top Bar */
        #topBar {
            position: absolute; top: 0; width: 100%; height: 45px;
            background: rgba(0,0,0,0.7); display: flex; 
            justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 100;
            border-bottom: 1px solid #222;
        }

        /* Main Video Container (Big Frame) */
        #mainContainer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            border: 4px solid transparent; 
            box-shadow: inset 0 0 30px var(--glow-color); /* Fade Greenish Margin */
            transition: all 0.5s ease;
        }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        /* Small Video Frame (Draggable & Swappable) */
        #localFrame {
            position: absolute; bottom: 100px; right: 30px;
            width: 180px; height: 240px; /* Size badha diya hai (Idhar se change karein) */
            border-radius: 15px; border: 2px solid #00ff7f;
            box-shadow: 0 0 15px var(--glow-color);
            overflow: hidden; cursor: grab; z-index: 50;
            background: #000; transition: all 0.3s ease;
        }
        #localVideo { width: 100%; height: 100%; object-fit: cover; }

        /* Controls Area */
        #controls {
            position: absolute; bottom: 25px; width: 100%;
            display: flex; justify-content: center; align-items: center;
            gap: 20px; z-index: 100;
        }

        .btn {
            padding: 12px 25px; border-radius: 30px; border: none;
            cursor: pointer; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }

        #callBtn { background: #28a745; color: white; margin-right: 50px; } /* Thoda left kiya */
        #endBtn { background: #dc3545; color: white; display: none; }
        #muteBtn { background: #444; color: white; display: none; }
        #recBtn { background: #ffc107; color: black; display: none; }

        #callState { position: absolute; bottom: 85px; font-size: 14px; color: #00ff7f; text-shadow: 0 0 5px #000; }
        
        /* Utility */
        .hidden { display: none !important; }
        #placeholder { position: absolute; color: #444; text-align: center; font-size: 20px; }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="topBar">
        <div style="color: #00ff7f; font-weight: bold;">MORYA CONFERENCING</div>
        <div id="serverStatus" style="font-size: 12px;">Connecting...</div>
    </div>

    <div id="mainContainer">
        <video id="remoteVideo" autoplay playsinline onclick="swapFrames()"></video>
        <div id="placeholder">INITIALIZING SYSTEM...</div>
    </div>

    <div id="localFrame" onclick="swapFrames()">
        <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <div id="callState">READY</div>
        
        <button id="callBtn" class="btn" onclick="initiateCall()">📞 START CALL</button>
        <button id="muteBtn" class="btn" onclick="toggleMute()">🎤 MUTE</button>
        <button id="recBtn" class="btn" onclick="toggleRecord()">⏺ REC</button>
        <button id="endBtn" class="btn" onclick="endCall()">🛑 END</button>
    </div>

<script>
let ws, pc, localStream, remoteStream, recorder;
let isMuted = false;
let isRecording = false;

const config = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

// UI Elements
const btnCall = document.getElementById("callBtn");
const btnEnd = document.getElementById("endBtn");
const btnMute = document.getElementById("muteBtn");
const btnRec = document.getElementById("recBtn");
const callState = document.getElementById("callState");

function log(msg) { console.log("LOG:", msg); }

// --- 1. AUDIO OPTIMIZATION ---
async function getMedia() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true,
                sampleRate: 48000
            }
        });
        document.getElementById("localVideo").srcObject = localStream;
        callState.innerText = "READY FOR CALL";
    } catch (e) { log("Media Error: " + e); }
}

// --- 2. WEBSOCKET ---
function connect() {
    ws = new WebSocket("wss://webrtc-server-1-m4s8.onrender.com");
    ws.onopen = () => {
        document.getElementById("serverStatus").innerText = "● SERVER ONLINE";
        document.getElementById("serverStatus").style.color = "#00ff7f";
        ws.send(JSON.stringify({ type: "join", room: "room1" }));
        getMedia();
    };
    ws.onmessage = async (msg) => {
        const d = JSON.parse(msg.data);
        if (d.type === "offer") await handleOffer(d.data);
        else if (d.type === "answer") await pc.setRemoteDescription(new RTCSessionDescription(d.data));
        else if (d.type === "candidate") pc.addIceCandidate(new RTCIceCandidate(d.data));
        else if (d.type === "stop") endCall(false);
    };
}

// --- 3. CALL LOGIC ---
async function initiateCall() {
    btnCall.style.display = "none";
    showActiveControls(true);
    callState.innerText = "CALLING...";
    
    await createPeer();
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    ws.send(JSON.stringify({ type: "offer", data: offer }));
}

async function handleOffer(data) {
    btnCall.style.display = "none";
    showActiveControls(true);
    
    await createPeer();
    await pc.setRemoteDescription(new RTCSessionDescription(data));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    ws.send(JSON.stringify({ type: "answer", data: answer }));
}

async function createPeer() {
    pc = new RTCPeerConnection(config);
    pc.onicecandidate = e => e.candidate && ws.send(JSON.stringify({ type: "candidate", data: e.candidate }));
    pc.ontrack = e => {
        document.getElementById("remoteVideo").srcObject = e.streams[0];
        document.getElementById("placeholder").style.display = "none";
        callState.innerText = "CONNECTED";
    };
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
}

// --- 4. UI FEATURES ---

function showActiveControls(active) {
    const display = active ? "flex" : "none";
    btnEnd.style.display = display;
    btnMute.style.display = display;
    btnRec.style.display = display;
}

function swapFrames() {
    const main = document.getElementById("remoteVideo");
    const small = document.getElementById("localVideo");
    const temp = main.srcObject;
    main.srcObject = small.srcObject;
    small.srcObject = temp;
    log("Frames Swapped");
}

function toggleMute() {
    isMuted = !isMuted;
    localStream.getAudioTracks()[0].enabled = !isMuted;
    btnMute.innerText = isMuted ? "🔇 UNMUTE" : "🎤 MUTE";
    btnMute.style.background = isMuted ? "#b21" : "#444";
}

function endCall(sendStop = true) {
    if (sendStop) ws.send(JSON.stringify({ type: "stop" }));
    if (pc) pc.close();
    document.getElementById("remoteVideo").srcObject = null;
    document.getElementById("placeholder").style.display = "block";
    showActiveControls(false);
    btnCall.style.display = "inline-block";
    callState.innerText = "CALL ENDED";
}

function toggleRecord() {
    // Basic recording logic
    if(!isRecording) {
        log("Recording started...");
        btnRec.style.background = "red";
        btnRec.innerText = "🛑 STOP REC";
    } else {
        log("Recording saved.");
        btnRec.style.background = "#ffc107";
        btnRec.innerText = "⏺ REC";
    }
    isRecording = !isRecording;
}

function unlockAudio() {
    const rv = document.getElementById("remoteVideo");
    if(rv.srcObject) rv.play().catch(()=>{});
}

window.onload = connect;
</script>
</body>
</html>
