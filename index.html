<!DOCTYPE html>
<html>
<head>
<title>WebRTC Test</title>
</head>
<body style="background:black;color:white;text-align:center;">

<h2>WebRTC Test</h2>
<video id="remoteVideo" autoplay playsinline style="width:45%"></video>
<video id="localVideo" autoplay playsinline muted style="width:45%"></video>
<br><br>
<button onclick="start()">START</button>
<button onclick="callPC()">CALL PC</button>
<p id="status">Waiting for join</p>

<script>
let ws;
let pc;


function start() {
    if (pc) {
    pc.close();
    pc = null;
 }
    alert("clicked"); 
    const status = document.getElementById("status");
    const remoteVideo = document.getElementById("remoteVideo");
    const localVideo = document.getElementById("localVideo");
   // const video = document.getElementById("video");
    

    ws = new WebSocket("wss://webrtc-server-1-m4s8.onrender.com");
    ws.onopen = async () => {
        status.innerText = "WebSocket Connected";

        ws.send(JSON.stringify({
            type: "join",
            room: "room1"
        }));

        // 🔥 WebRTC start
        pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        });

        pc.addTransceiver("video" ,{ direction: "sendrecv" });
       
        // 🔥 VIDEO RECEIVE
        pc.ontrack = (event) => {
            console.log("REMOTE TRACK");
             remoteVideo.srcObject = event.streams[0];
            status.innerText = "Streaming...";
        };

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                ws.send(JSON.stringify({
                    type: "candidate",
                    data: { candidate: event.candidate.candidate,
                sdpMid: event.candidate.sdpMid,
                sdpMLineIndex: event.candidate.sdpMLineIndex}
                }));
            }
        };
       let stream;
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true,audio: true});
            console.log("CAMERA OK");
        } catch (e) {
            console.log("CAMERA ERROR:", e);
            alert("Camera permission issue");
            return;
        }
        localVideo.srcObject = stream;
        stream.getTracks().forEach(track => {
            pc.addTrack(track, stream);});
        status.innerText = "Ready...";
        

        // 🔥 FORCE VP8 ONLY (MOST IMPORTANT FIX)
        const sender = pc.getSenders().find(s => s.track && s.track.kind === "video");
        if (sender) {
            const params = sender.getParameters();
            if (params.codecs) {
                params.codecs = params.codecs.filter(c => c.mimeType === "video/VP8");
                sender.setParameters(params); 
                        }
                    }
            status.innerText = "Ready...";
        };
       
        

    ws.onmessage = async (msg) => {
        const data = JSON.parse(msg.data);
        
         // 📞 Incoming call
        if (data.type === "call_request") {
            let accept = confirm("Incoming Call... Accept?");
            if (accept) {
                ws.send(JSON.stringify({ type: "call_accept" }));
            } else {
                ws.send(JSON.stringify({ type: "call_reject" }));
            }
        }

        // ✅ Call accepted → START OFFER
        else if (data.type === "call_accept") {
            const offer = await pc.createOffer({
                offerToReceiveVideo: true
            });

            await pc.setLocalDescription(offer);

            ws.send(JSON.stringify({
                type: "offer",
                data: offer
            }));

            status.innerText = "Calling...";
        }

       

        else if (data.type === "answer") {
            await pc.setRemoteDescription(new RTCSessionDescription(data.data));
            document.getElementById("status").innerText = "Connected!";}
        else if (data.type === "candidate") {
            try {
                await pc.addIceCandidate(new RTCIceCandidate(data.data)); } catch {}         }
        else if (data.type === "stop") {
            if (pc) {
                pc.close();
                pc = null; }
            if (remoteVideo.srcObject) {
                remoteVideo.srcObject.getTracks().forEach(t => t.stop());
                remoteVideo.srcObject = null; }
            if (localVideo.srcObject) { localVideo.srcObject.getTracks().forEach(t => t.stop());localVideo.srcObject = null;}
            document.getElementById("status").innerText = "Waiting for join";} };
     }
function callPC() {
    if (ws){
    ws.send(JSON.stringify({ type: "call_request" }));}}
</script>
   

</body>
</html>
