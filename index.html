<!DOCTYPE html>
<html>
<head>
    <title>WebRTC Auto-Morya</title>
</head>
<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

    <h2 id="title">Morya Video Connect</h2>
    
    <div style="display: flex; justify-content: center; gap: 10px;">
        <video id="remoteVideo" autoplay playsinline style="width:48%; border:2px solid #333; background:#111; border-radius:10px;"></video>
        <video id="localVideo" autoplay playsinline muted style="width:48%; border:2px solid #333; background:#111; border-radius:10px;"></video>
    </div>
    
    <br>
    <div id="status" style="font-weight:bold; color:#00ff00; margin-bottom:10px;">Initializing...</div>
    
    <button id="callBtn" onclick="initiateCall()" style="padding:15px 30px; font-size:16px; cursor:pointer; background: #28a745; color:white; border:none; border-radius:5px; display:none;">
        📞 START CALL
    </button>

    <div id="log" style="font-size:10px; color:yellow; margin-top:15px; height:80px; overflow-y:auto; text-align:left; padding:10px; border-top:1px solid #333;"></div>

<script>
let ws;
let pc;
let localStream;
let remoteStream;
let isSocketConnected = false;

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject"
        }
    ]
};

function log(msg) {
    const l = document.getElementById("log");
    l.innerHTML += `> ${msg}<br>`;
    l.scrollTop = l.scrollHeight;
}

// --- 1. WEBSOCKET & RECONNECT LOGIC ---
function connectServer() {
    ws = new WebSocket("wss://webrtc-server-1-m4s8.onrender.com");
    
    ws.onopen = () => {
        isSocketConnected = true;
        document.getElementById("status").innerText = "Server Connected. Ready.";
        document.getElementById("callBtn").style.display = "inline-block";
        ws.send(JSON.stringify({ type: "join", room: "room1" }));
        log("WebSocket Connected");
    };

    ws.onmessage = async (msg) => {
        const data = JSON.parse(msg.data);
        log("Received: " + data.type);

        if (data.type === "offer") {
            await handleOffer(data.data);
        } else if (data.type === "answer") {
            await pc.setRemoteDescription(new RTCSessionDescription(data.data));
        } else if (data.type === "candidate") {
            try { await pc.addIceCandidate(new RTCIceCandidate(data.data)); } catch(e){}
        } else if (data.type === "stop") {
            log("Stop signal received. Resetting...");
            resetConnection();
        }
    };

    ws.onclose = () => {
        isSocketConnected = false;
        document.getElementById("status").innerText = "Reconnecting to server...";
        setTimeout(connectServer, 3000); // Auto reconnect websocket
    };
}

// --- 2. WEBRTC CORE ---
async function setupMedia() {
    if (localStream) return;
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ 
            video: true, 
            audio: { echoCancellation: true, noiseSuppression: true } 
        });
        document.getElementById("localVideo").srcObject = localStream;
    } catch (e) {
        log("Media Error: " + e);
    }
}

async function createPC() {
    if (pc) pc.close();
    pc = new RTCPeerConnection(config);

    pc.onicecandidate = (event) => {
        if (event.candidate) ws.send(JSON.stringify({ type: "candidate", data: event.candidate }));
    };

    pc.ontrack = (event) => {
        log("Remote track added");
        if (!remoteStream) remoteStream = new MediaStream();
        remoteStream.addTrack(event.track);
        const rv = document.getElementById("remoteVideo");
        rv.srcObject = remoteStream;
        rv.muted = false; // Auto unmute
        rv.play().catch(() => log("Auto-play blocked, wait for interaction"));
    };

    pc.onconnectionstatechange = () => {
        if (pc.connectionState === "disconnected" || pc.connectionState === "failed") {
            log("Connection lost. Retrying...");
            resetConnection();
        }
    };

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
}

// --- 3. ACTIONS ---
async function initiateCall() {
    await setupMedia();
    await createPC();
    
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    ws.send(JSON.stringify({ type: "offer", data: offer }));
    document.getElementById("status").innerText = "Calling...";
}

async function handleOffer(offerData) {
    await setupMedia();
    await createPC();
    await pc.setRemoteDescription(new RTCSessionDescription(offerData));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    ws.send(JSON.stringify({ type: "answer", data: answer }));
    document.getElementById("status").innerText = "Connected";
}

function resetConnection() {
    if (pc) {
        pc.close();
        pc = null;
    }
    remoteStream = null;
    document.getElementById("remoteVideo").srcObject = null;
    document.getElementById("status").innerText = "Connection Reset. Ready again.";
}

// Start everything
window.onload = connectServer;

// Global interaction listener to bypass audio block
document.body.addEventListener('click', () => {
    const rv = document.getElementById("remoteVideo");
    if(rv.srcObject) rv.play();
}, { once: false });

</script>
</body>
</html>
