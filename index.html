<!DOCTYPE html>
<html>
<head>
<title>WebRTC Test</title>
</head>
<body style="background:black;color:white;text-align:center;">

<h2>WebRTC Test</h2>
<video id="remoteVideo" autoplay playsinline style="width:45%"></video>
<video id="localVideo" autoplay playsinline muted style="width:45%"></video>
<br><br>
<button onclick="start()">START</button>
<button onclick="callPC()">CALL PC</button>
<p id="status">Waiting for join</p>

<script>
let ws;
let pc;

function start() {
     if (ws) {
        ws.close();
        ws = null;
    }
    if (pc) {
        pc.close();
        pc = null;
    }

    alert("clicked");

    const status = document.getElementById("status");
    const remoteVideo = document.getElementById("remoteVideo");
    const localVideo = document.getElementById("localVideo");

    ws = new WebSocket("wss://webrtc-server-1-m4s8.onrender.com");

    // 🔵 ON OPEN
    ws.onopen = async () => {
        status.innerText = "WebSocket Connected";

        ws.send(JSON.stringify({
            type: "join",
            room: "room1"
        }));

        pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        });

        pc.addTransceiver("video", { direction: "sendrecv" });

        pc.ontrack = (event) => {
            remoteVideo.srcObject = event.streams[0];
            status.innerText = "Streaming...";
        };

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                ws.send(JSON.stringify({
                    type: "candidate",
                    data: {
                        candidate: event.candidate.candidate,
                        sdpMid: event.candidate.sdpMid,
                        sdpMLineIndex: event.candidate.sdpMLineIndex
                    }
                }));
            }
        };

        let stream;
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: true,
                audio: true
            });
        } catch (e) {
            alert("Camera permission issue");
            return;
        }

        localVideo.srcObject = stream;

        stream.getTracks().forEach(track => {
            pc.addTrack(track, stream);
        });

        // 🔥 VP8 FIX
        const sender = pc.getSenders().find(s => s.track && s.track.kind === "video");
        if (sender) {
            const params = sender.getParameters();
            if (params.codecs) {
                params.codecs = params.codecs.filter(c => c.mimeType === "video/VP8");
                sender.setParameters(params);
            }
        }

        status.innerText = "Ready...";
    };

    // 🟢 ON MESSAGE
    ws.onmessage = async (msg) => {
        const data = JSON.parse(msg.data);

        // 📞 Incoming call
        if (data.type === "call_request") {
            let accept = confirm("Incoming Call... Accept?");
            if (accept) {
                ws.send(JSON.stringify({ type: "call_accept" }));
            } else {
                ws.send(JSON.stringify({ type: "call_reject" }));
            }
        }

        // ✅ Call accepted → START OFFER
        else if (data.type === "call_accept") {

            pc.getSenders().forEach(sender => {
                if (sender.track) sender.track.enabled = true;
            });
            const offer = await pc.createOffer({
                offerToReceiveVideo: true
            });

            await pc.setLocalDescription(offer);

            ws.send(JSON.stringify({
                type: "offer",
                data: offer
            }));
           
            status.innerText = "Calling...";
        }

        // 🎯 Answer
        else if (data.type === "answer") {
            await pc.setRemoteDescription(new RTCSessionDescription(data.data));
            status.innerText = "Connected!";
        }

        // 🔁 ICE
        else if (data.type === "candidate") {
            try {
                await pc.addIceCandidate(new RTCIceCandidate(data.data));
            } catch {}
        }

        // 🛑 Stop
        else if (data.type === "stop") {
            status.innerText = "Call Stopped. Resetting...";
             if (pc) {
                pc.getSenders().forEach(sender => {
                        if (sender.track) sender.track.stop(); // Camera band karein
                    });
                pc.close();
                pc = null;
             }

             if (ws) {
                        ws.close();
                        ws = null;
             }                                   
            if (remoteVideo.srcObject) {
                remoteVideo.srcObject.getTracks().forEach(t => t.stop());
                remoteVideo.srcObject = null;
            }
            if (localVideo.srcObject) {
                localVideo.srcObject.getTracks().forEach(t => t.stop());
                localVideo.srcObject = null;
            }                    
            status.innerText = "Ready for new connection";
           
        }
    };
}

// 📞 CALL BUTTON
function callPC() {
    if (ws) {
        ws.send(JSON.stringify({ type: "call_request" }));
    }
}
window.onload = () => {
    start();
};
</script>
   

</body>
</html>
