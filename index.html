<!DOCTYPE html>
<html>
<head>
<title>WebRTC Test</title>
</head>
<body style="background:black;color:white;text-align:center;">

<h2>WebRTC Test</h2>
<video id="remoteVideo" autoplay playsinline controls style="width:45%"></video>
<video id="localVideo" autoplay playsinline muted style="width:45%"></video>
<br><br>
<button onclick="start()">START</button>
<button onclick="callPC()">CALL PC</button>
<p id="status">Waiting for join</p>

<script>
let ws;
let pc;
let pingInterval = null;

let reconnectTimeout = null;
let reconnectAttempts = 0;
// 🔁 RECONNECT LOGIC
function reconnect() {
    if (reconnectTimeout) return;

    reconnectAttempts++;
    console.log("Reconnecting attempt:", reconnectAttempts);

    reconnectTimeout = setTimeout(() => {
        reconnectTimeout = null;
        start();
    }, Math.min(5000, reconnectAttempts * 1000));
}

function start() {
    reconnectAttempts = 0;

    if (reconnectTimeout) {
        clearTimeout(reconnectTimeout);
        reconnectTimeout = null;
    }
    if (pingInterval) {
        clearInterval(pingInterval);
        pingInterval = null;
    }

     if (ws) {
        ws.close();
        ws = null;
    }
    if (pc) {
        pc.close();
        pc = null;
    }
    const status = document.getElementById("status");
    const remoteVideo = document.getElementById("remoteVideo");
    const localVideo = document.getElementById("localVideo");

       // 🔊 AUDIO FIX
    remoteVideo.muted = false;
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    audioContext.resume();

    ws = new WebSocket("wss://webrtc-server-1-m4s8.onrender.com");
    ws.onclose = () => {
    console.log("WS CLOSED");
    status.innerText = "Disconnected";
    reconnect();
    };

    ws.onerror = (e) => {
        console.log("WS ERROR", e);
        reconnect();
    };
    // 🔵 ON OPEN
    ws.onopen = async () => {
        status.innerText = "WebSocket Connected";

        ws.send(JSON.stringify({
            type: "join",
            room: "room1"
        }));
        ws.send(JSON.stringify({
             type: "ready"
        }));
        pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        });

        pc.addTransceiver("video", { direction: "sendrecv" });
        pc.addTransceiver("audio", { direction: "sendrecv" });
        pc.ontrack = (event) => {
           console.log("TRACK:", event.track.kind);
           if (!remoteVideo.srcObject) {
                remoteVideo.srcObject = event.streams[0];
            }

            // 🔊 ensure audio plays
            if (event.track.kind === "audio") {
                remoteVideo.muted = false;

                setTimeout(() => {
                    remoteVideo.play().catch(e => {
                        console.log("Play blocked:", e);
                    });
                }, 100);
            }              
            status.innerText = "Streaming...";
        };
        pc.onconnectionstatechange = () => {
            console.log("PC State:", pc.connectionState);
            if (pc.connectionState === "failed" || pc.connectionState === "disconnected") {
                reconnect();
            }
        };

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                ws.send(JSON.stringify({
                    type: "candidate",
                    data: {
                        candidate: event.candidate.candidate,
                        sdpMid: event.candidate.sdpMid,
                        sdpMLineIndex: event.candidate.sdpMLineIndex
                    }
                }));
            }
        };
        let stream;
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: true,
                audio: true
            });
        } catch (e) {
            alert("Camera permission issue");
            return;
        }

        localVideo.srcObject = stream;

        stream.getTracks().forEach(track => {
            pc.addTrack(track, stream);
        });

        // 🔥 VP8 FIX
        const sender = pc.getSenders().find(s => s.track && s.track.kind === "video");
        if (sender) {
            const params = sender.getParameters();
            if (params.codecs) {
                params.codecs = params.codecs.filter(c => c.mimeType === "video/VP8");
                sender.setParameters(params);
            }
        }

        status.innerText = "Ready...";
        
        
        pingInterval = setInterval(() => {
            if (ws && ws.readyState === 1) {
                    ws.send(JSON.stringify({ type: "ping" }));
            }
         }, 15000);
    };

   
    // 🟢 ON MESSAGE
    ws.onmessage = async (msg) => {
        const data = JSON.parse(msg.data);

        // 📞 Incoming call
        if (data.type === "call_request") {
            let accept = confirm("Incoming Call... Accept?");
            if (accept) {
                ws.send(JSON.stringify({ type: "call_accept" }));
            } else {
                ws.send(JSON.stringify({ type: "call_reject" }));
            }
        }

        // ✅ Call accepted → START OFFER
        else if (data.type === "call_accept") {

            pc.getSenders().forEach(sender => {
                if (sender.track) sender.track.enabled = true;
            });
            const offer = await pc.createOffer({
                offerToReceiveVideo: true,
                offerToReceiveAudio: true
            });

            await pc.setLocalDescription(offer);

            ws.send(JSON.stringify({
                type: "offer",
                data: offer
            }));
           
            status.innerText = "Calling...";
        }

        // 🎯 Answer
        else if (data.type === "answer") {
            await pc.setRemoteDescription(new RTCSessionDescription(data.data));
            status.innerText = "Connected!";
        }

        // 🔁 ICE
        else if (data.type === "candidate") {
            try {
                await pc.addIceCandidate(new RTCIceCandidate(data.data));
            } catch {}
        }

        // 🛑 Stop
        else if (data.type === "stop") {
             console.log("STOP RECEIVED");
             if (pingInterval) {
                clearInterval(pingInterval);
                pingInterval = null;
            }
          
             if (pc) {
                pc.close();
                pc = null;
            }      
             if (ws) {
                ws.onclose = null;
                ws.close();
                ws = null;
             }                     
           
            if (remoteVideo.srcObject) {
                remoteVideo.srcObject.getTracks().forEach(t => t.stop());
                remoteVideo.srcObject = null;
            }
            if (localVideo.srcObject) {
                localVideo.srcObject.getTracks().forEach(t => t.stop());
                localVideo.srcObject = null;
            }                    
            status.innerText = "Reconnecting...";
            reconnect();
           
            }
    };
}

// 📞 CALL BUTTON
function callPC() {
    if (ws) {
        ws.send(JSON.stringify({ type: "call_request" }));
    }
}
window.onload = () => {
    start();
};
</script>
   

</body>
</html>
