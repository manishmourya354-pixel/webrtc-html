<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morya Pro 4K - Fixed</title>
    <style>
        :root { --morya-green: #00ff7f; --bg-dark: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: white; font-family: sans-serif; overflow: hidden; }
        
        #topBar { position: absolute; top: 0; width: 100%; height: 45px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 100; border-bottom: 1.5px solid #1a1a1a; }
        #mainContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; border: 8px solid #111; box-sizing: border-box; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        #localFrame { position: absolute; bottom: 110px; right: 30px; width: 220px; height: 300px; border-radius: 12px; border: 2.5px solid var(--morya-green); overflow: hidden; cursor: grab; z-index: 1000; background: #000; touch-action: none; }
        #localVideo { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* Status & UI */
        #statusIndicator { font-size: 11px; color: #ffbc00; } 
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 500; }
        .btn { padding: 14px 28px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #callBtn { background: var(--morya-green); color: black; }
        #endBtn { background: #ff4444; color: white; display: none; }
        
        /* Incoming UI */
        #incomingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="topBar">
        <strong style="color: var(--morya-green);">MORYA 4K SYSTEM</strong>
        <div id="statusIndicator">SERVER: WAKING UP...</div>
    </div>

    <div id="mainContainer">
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div id="localFrame">
        <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <div id="controls">
        <button id="callBtn" class="btn" onclick="initiateCall()">📞 START CALL</button>
        <button id="endBtn" class="btn" onclick="endCall()">🛑 END</button>
    </div>

    <div id="incomingOverlay">
        <h2 style="color:var(--morya-green)">INCOMING CALL...</h2>
        <button onclick="acceptCall()" style="background:var(--morya-green); padding:20px 40px; border-radius:50px; border:none; font-weight:bold; cursor:pointer;">ANSWER</button>
        <button onclick="rejectCall()" style="margin-top:20px; background:none; border:1px solid red; color:red; cursor:pointer;">REJECT</button>
    </div>

<script>
let ws, pc, localStream;
let pendingOffer = null;

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
    ]
};

// 1. WebSocket Fix (Waking up Render)
function connect() {
    const status = document.getElementById("statusIndicator");
    status.innerText = "SERVER: CONNECTING...";
    
    ws = new WebSocket("wss://webrtc-server-1-m4s8.onrender.com");

    ws.onopen = () => {
        status.innerText = "SERVER: ONLINE";
        status.style.color = "#00ff7f";
        ws.send(JSON.stringify({ type: "join", room: "room1" }));
        getMedia(); 
    };

    ws.onmessage = async (msg) => {
        const d = JSON.parse(msg.data);
        if (d.type === "offer") {
            pendingOffer = d.data;
            document.getElementById("incomingOverlay").style.display = "flex";
        } 
        else if (d.type === "answer") {
            await pc.setRemoteDescription(new RTCSessionDescription(d.data));
            status.innerText = "STATUS: CONNECTED";
        }
        else if (d.type === "candidate") {
            if (pc) pc.addIceCandidate(new RTCIceCandidate(d.data)).catch(e => {});
        }
        else if (d.type === "stop") resetUI();
    };

    ws.onclose = () => {
        status.innerText = "SERVER: OFFLINE (RETRYING...)";
        status.style.color = "red";
        setTimeout(connect, 3000); // Auto-retry
    };

    ws.onerror = () => { status.innerText = "SERVER: ERROR"; };
}

// 2. Media Fix (Camera Reset)
async function getMedia() {
    try {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        localStream = await navigator.mediaDevices.getUserMedia({
            video: { width: 1280, height: 720 }, // 4K ki jagah pehle HD test karein
            audio: true
        });
        document.getElementById("localVideo").srcObject = localStream;
    } catch (e) {
        alert("Camera Permission Required!");
    }
}

// 3. WebRTC Peer Connection
async function createPeer() {
    pc = new RTCPeerConnection(config);
    
    pc.onicecandidate = e => {
        if (e.candidate) ws.send(JSON.stringify({ type: "candidate", data: e.candidate }));
    };

    pc.ontrack = e => {
        document.getElementById("remoteVideo").srcObject = e.streams[0];
        document.getElementById("statusIndicator").innerText = "STATUS: STREAMING";
    };

    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
}

async function initiateCall() {
    await createPeer();
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    ws.send(JSON.stringify({ type: "offer", data: offer }));
    
    document.getElementById("callBtn").style.display = "none";
    document.getElementById("endBtn").style.display = "block";
    document.getElementById("statusIndicator").innerText = "STATUS: CALLING...";
}

async function acceptCall() {
    document.getElementById("incomingOverlay").style.display = "none";
    await createPeer();
    await pc.setRemoteDescription(new RTCSessionDescription(pendingOffer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    ws.send(JSON.stringify({ type: "answer", data: answer }));
    
    document.getElementById("callBtn").style.display = "none";
    document.getElementById("endBtn").style.display = "block";
}

function resetUI() {
    if (pc) pc.close();
    document.getElementById("remoteVideo").srcObject = null;
    document.getElementById("callBtn").style.display = "block";
    document.getElementById("endBtn").style.display = "none";
    document.getElementById("incomingOverlay").style.display = "none";
    document.getElementById("statusIndicator").innerText = "SERVER: ONLINE";
}

function endCall() {
    ws.send(JSON.stringify({ type: "stop" }));
    resetUI();
}

// Start
window.onload = connect;
</script>
</body>
</html>
